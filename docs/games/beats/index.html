<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光音记忆 · Simon Says</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body {
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    background: radial-gradient(ellipse at center, #1a1025, #0a0612);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

#game-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* 背景粒子 */
.bg-particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
    animation: floatParticle 12s infinite ease-in-out;
}
@keyframes floatParticle {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
    50% { transform: translateY(-40px) scale(1.3); opacity: 0.8; }
}

/* 侧边装饰 */
.side-deco {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.35;
}
.side-deco.left { left: 16px; }
.side-deco.right { right: 16px; }

.deco-bar {
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(180deg, rgba(167,139,250,0.5), transparent);
    animation: decoPulse 3s infinite ease-in-out;
}
.side-deco.left .deco-bar:nth-child(6) { height: 28px; animation-delay: 0s; }
.side-deco.left .deco-bar:nth-child(7) { height: 52px; animation-delay: 0.6s; }
.side-deco.left .deco-bar:nth-child(8) { height: 36px; animation-delay: 1.2s; }
.side-deco.left .deco-bar:nth-child(9) { height: 48px; animation-delay: 1.8s; }
.side-deco.right .deco-bar:nth-child(6) { height: 42px; animation-delay: 0.3s; }
.side-deco.right .deco-bar:nth-child(7) { height: 32px; animation-delay: 0.9s; }
.side-deco.right .deco-bar:nth-child(8) { height: 54px; animation-delay: 1.5s; }
.side-deco.right .deco-bar:nth-child(9) { height: 38px; animation-delay: 2.1s; }

@keyframes decoPulse {
    0%, 100% { opacity: 0.25; transform: scaleY(1); }
    50% { opacity: 0.8; transform: scaleY(1.3); }
}

.deco-note {
    position: absolute;
    color: rgba(255,255,255,0.08);
    font-size: 1.3rem;
    animation: decoDrift 7s infinite ease-in-out;
}

@keyframes decoDrift {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
    50% { transform: translateY(-12px) rotate(8deg); opacity: 0.45; }
}

/* 侧边五线谱与谱号 */
.deco-clef {
    position: absolute;
    font-size: 3.2rem;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
}
.side-deco.left .deco-clef { bottom: 18%; left: 4px; }
.side-deco.right .deco-clef { bottom: 18%; right: 4px; }

.deco-staff {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 3px;
    opacity: 0.1;
}
.staff-line {
    width: 30px;
    height: 1px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
}
.side-deco.left .deco-staff { left: 0; }
.side-deco.right .deco-staff { right: 0; }

/* staff 纵向分布位置 */
.side-deco .deco-staff:nth-of-type(1) { top: 12%; }
.side-deco .deco-staff:nth-of-type(2) { top: 32%; }
.side-deco .deco-staff:nth-of-type(3) { top: 52%; }
.side-deco .deco-staff:nth-of-type(4) { top: 72%; }

/* 顶部信息栏 */
.top-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    flex-shrink: 0;
}
.top-bar h1 {
    color: #fff;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.top-info {
    display: flex;
    gap: 20px;
    align-items: center;
}
.top-info .item { text-align: center; }
.top-info .item .lbl {
    color: rgba(255,255,255,0.3);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.top-info .item .val {
    color: #fff;
    font-size: 1.3rem;
    font-weight: 700;
}
.top-info .item .val.high { color: #fbbf24; }

/* 中央游戏区 */
.pad-area {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    min-height: 0;
    padding: 10px 20px;
}

/* 可视化条区域 */
.visual-zone {
    flex-shrink: 0;
    height: clamp(60px, 18vh, 160px);
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 8px;
}

.viz-row {
    display: flex;
    gap: 14px;
    align-items: flex-end;
}

.viz-bar {
    width: 48px;
    border-radius: 4px 4px 0 0;
    height: 0;
    transition: height 0.12s ease, opacity 0.2s;
    opacity: 0;
}
.viz-bar.active {
    opacity: 1;
}
.viz-bar.green { background: linear-gradient(180deg, rgba(34,197,94,0.5), rgba(34,197,94,0.1)); }
.viz-bar.red { background: linear-gradient(180deg, rgba(239,68,68,0.5), rgba(239,68,68,0.1)); }
.viz-bar.yellow { background: linear-gradient(180deg, rgba(234,179,8,0.5), rgba(234,179,8,0.1)); }
.viz-bar.blue { background: linear-gradient(180deg, rgba(59,130,246,0.5), rgba(59,130,246,0.1)); }

/* 浮动音符 */
.float-note {
    position: absolute;
    pointer-events: none;
    font-size: 1.4rem;
    font-weight: bold;
    opacity: 0;
    z-index: 3;
    animation: noteRise 1.2s ease-out forwards;
}
@keyframes noteRise {
    0% { opacity: 0; transform: translateY(0) scale(0.4) rotate(-10deg); }
    15% { opacity: 1; transform: translateY(-10px) scale(1) rotate(0); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.1) rotate(10deg); }
}

.pad-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: min(320px, 70vmin);
    position: relative;
    z-index: 2;
    flex-shrink: 0;
}

.pad {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.1s;
    border: 2px solid;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
}
.pad:active { transform: scale(0.93); }

.pad-inner {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.1s;
}

/* 四种颜色 */
.pad-green { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); }
.pad-green .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(34,197,94,0.15), transparent 70%); }
.pad-green.active { background: rgba(34,197,94,0.75); border-color: #22c55e; box-shadow: 0 0 60px rgba(34,197,94,0.7), inset 0 0 25px rgba(34,197,94,0.2); }
.pad-green.active .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(34,197,94,0.7), rgba(34,197,94,0.25) 70%); }

.pad-red { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); }
.pad-red .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(239,68,68,0.15), transparent 70%); }
.pad-red.active { background: rgba(239,68,68,0.75); border-color: #ef4444; box-shadow: 0 0 60px rgba(239,68,68,0.7), inset 0 0 25px rgba(239,68,68,0.2); }
.pad-red.active .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(239,68,68,0.7), rgba(239,68,68,0.25) 70%); }

.pad-yellow { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.25); }
.pad-yellow .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(234,179,8,0.15), transparent 70%); }
.pad-yellow.active { background: rgba(234,179,8,0.75); border-color: #eab308; box-shadow: 0 0 60px rgba(234,179,8,0.7), inset 0 0 25px rgba(234,179,8,0.2); }
.pad-yellow.active .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(234,179,8,0.7), rgba(234,179,8,0.25) 70%); }

.pad-blue { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.25); }
.pad-blue .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(59,130,246,0.15), transparent 70%); }
.pad-blue.active { background: rgba(59,130,246,0.75); border-color: #3b82f6; box-shadow: 0 0 60px rgba(59,130,246,0.7), inset 0 0 25px rgba(59,130,246,0.2); }
.pad-blue.active .pad-inner { background: radial-gradient(circle at 50% 40%, rgba(59,130,246,0.7), rgba(59,130,246,0.25) 70%); }

.pad-label {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.15);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    pointer-events: none;
}

/* 状态文字 */
.status-text {
    flex-shrink: 0;
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
    font-weight: 500;
    transition: 0.3s;
    text-align: center;
    padding-bottom: 4px;
}
.status-text.playing { color: #fbbf24; }
.status-text.wrong { color: #ef4444; animation: shake 0.4s; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

/* 底部按钮 */
.bottom-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    padding: 12px 24px 20px;
    flex-shrink: 0;
}

.btn {
    padding: 10px 28px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: 0.25s;
    letter-spacing: 0.5px;
}
.btn-primary {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,58,237,0.5); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-secondary {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* 闪光覆盖层 */
.flash-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.15s;
}

/* 游戏结束覆盖层 */
.game-over {
    position: absolute;
    inset: 0;
    background: rgba(5,2,12,0.92);
    backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 30px;
}
.game-over.show { display: flex; }

.go-title {
    font-size: 3rem;
    font-weight: 900;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #fbbf24, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.go-sub {
    color: rgba(255,255,255,0.4);
    font-size: 0.9rem;
    margin-bottom: 28px;
}
.go-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 32px;
}
.go-stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
}
.go-stat .label { color: rgba(255,255,255,0.3); font-size: 0.7rem; }
.go-stat .val { color: #fff; font-size: 1.8rem; font-weight: 700; margin-top: 2px; }
.go-stat .val.gold { color: #fbbf24; }

/* 响应式 */
@media (max-width: 500px) {
    .top-bar { padding: 12px 16px; }
    .top-bar h1 { font-size: 1rem; }
    .top-info .item .val { font-size: 1rem; }
    .top-info { gap: 14px; }

    .pad-grid { gap: 10px; width: min(260px, 80vmin); }
    .pad { border-radius: 16px; }
    .pad-inner { border-radius: 14px; }
    .pad-label { font-size: 0.75rem; }
    .viz-bar { width: 36px; }
    .viz-row { gap: 10px; }

    .status-text { font-size: 0.8rem; }
    .bottom-bar { padding: 10px 16px 16px; gap: 10px; }
    .btn { padding: 8px 20px; font-size: 0.8rem; }
    .visual-zone { height: clamp(40px, 14vh, 100px); }

    .side-deco { width: 28px; }
    .side-deco.left { left: 8px; }
    .side-deco.right { right: 8px; }
    .deco-bar { width: 2px; }
    .deco-note { font-size: 0.9rem; }
    .deco-clef { font-size: 2rem; }
    .staff-line { width: 20px; }
    .side-deco .deco-staff:nth-of-type(2) { top: 30%; }
    .side-deco .deco-staff:nth-of-type(3) { top: 48%; }
    .side-deco .deco-staff:nth-of-type(4) { top: 66%; }
}
</style>
</head>
<body>

<div id="game-container">
    <!-- 背景粒子 -->
    <div class="bg-particle" style="width:80px;height:80px;top:10%;left:10%;animation-delay:0s;"></div>
    <div class="bg-particle" style="width:120px;height:120px;top:60%;right:15%;animation-delay:3s;"></div>

    <div class="side-deco left">
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-clef">𝄞</div>
        <div class="deco-bar"></div>
        <div class="deco-bar"></div>
        <div class="deco-bar"></div>
        <div class="deco-bar"></div>
        <div class="deco-note" style="top:15%;animation-delay:0s;">♩</div>
        <div class="deco-note" style="top:33%;animation-delay:1.8s;">♪</div>

        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>
        <div class="deco-staff"><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div></div>

<script>
// ============================================================
// 光音记忆 · 经典 Simon Says
// ============================================================

// ---- 音频系统 ----
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

const NOTES = [262, 330, 392, 523]; // C4, E4, G4, C5

function playTone(index, duration = 0.3) {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = NOTES[index];
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) { /* 静默降级 */ }
}

function playChord() {
    try {
        initAudio();
        NOTES.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(audioCtx.currentTime + i * 0.08);
            osc.stop(audioCtx.currentTime + 0.5);
        });
    } catch(e) { /* 静默降级 */ }
}

function playFail() {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) { /* 静默降级 */ }
}

// ---- 视觉特效 ----
function animateVizBar(index) {
    const bars = document.querySelectorAll('.viz-bar');
    const bar = bars[index];
    if (!bar) return;
    const h = 60 + Math.random() * 100;
    bar.style.height = h + 'px';
    bar.classList.add('active');
    setTimeout(() => {
        bar.style.height = '0';
        bar.classList.remove('active');
    }, 300);
}

function spawnFloatNote(index) {
    const area = document.querySelector('.pad-area');
    const note = document.createElement('div');
    note.className = 'float-note';
    const symbols = ['♩', '♪', '♫', '♬'];
    const colors = ['#22c55e', '#ef4444', '#eab308', '#3b82f6'];
    note.textContent = symbols[index];
    note.style.color = colors[index];
    const pos = [
        { left: '24%', top: '38%' },
        { left: '72%', top: '38%' },
        { left: '24%', top: '56%' },
        { left: '72%', top: '56%' },
    ];
    note.style.left = pos[index].left;
    note.style.top = pos[index].top;
    area.appendChild(note);
    setTimeout(() => note.remove(), 1300);
}

function flashOverlay() {
    const el = document.getElementById('flashOverlay');
    el.style.opacity = '0.25';
    setTimeout(() => el.style.opacity = '0', 180);
}

// ---- 游戏状态 ----
const COLORS = ['green', 'red', 'yellow', 'blue'];
let sequence = [];
let playerIndex = 0;
let round = 0;
let score = 0;
let hits = 0;
let isPlaying = false;
let isPlayerTurn = false;
let highScore = parseInt(localStorage.getItem('beatsHighScore')) || 0;
let speed = 600;

// DOM
const pads = document.querySelectorAll('.pad');
const scoreEl = document.getElementById('scoreDisplay');
const highEl = document.getElementById('highScoreDisplay');
const roundEl = document.getElementById('roundDisplay');
const statusEl = document.getElementById('statusText');
const startBtn = document.getElementById('startBtn');

highEl.textContent = highScore;

// ---- 灯光效果 ----
function lightPad(index, on) {
    const pad = pads[index];
    if (on) {
        pad.classList.add('active');
    } else {
        pad.classList.remove('active');
    }
}

function flashPad(index, duration = 300) {
    lightPad(index, true);
    playTone(index, duration / 1000);
    animateVizBar(index);
    setTimeout(() => lightPad(index, false), duration);
}

// ---- 核心逻辑 ----
const PHRASES = [
    [0,1,2,3], [3,2,1,0], [0,2,1,3], [1,0,2,3],
    [3,1,2,0], [0,2,3,1], [2,0,1,3], [1,3,2,0],
    [0,0,1,2], [3,3,2,1], [0,2,0,3], [1,2,1,3],
    [0,1,0,2], [3,2,3,1], [2,0,3,1], [1,3,0,2],
    [0,1,2,1], [3,2,1,2], [0,3,2,3], [1,0,1,2],
    [2,3,0,1], [1,2,3,0], [3,0,1,2], [2,1,0,3],
];

let phraseGen = { phrase: [], idx: 0 };

function getNextMusicalNote() {
    if (phraseGen.idx >= phraseGen.phrase.length) {
        phraseGen.phrase = PHRASES[Math.floor(Math.random() * PHRASES.length)];
        if (sequence.length > 0) {
            const last = sequence[sequence.length - 1];
            let attempts = 0;
            while (phraseGen.phrase[0] === last && attempts < 20) {
                phraseGen.phrase = PHRASES[Math.floor(Math.random() * PHRASES.length)];
                attempts++;
            }
        }
        phraseGen.idx = 0;
    }
    return phraseGen.phrase[phraseGen.idx++];
}

function addStep() {
    sequence.push(getNextMusicalNote());
}

async function playSequence() {
    isPlaying = true;
    isPlayerTurn = false;
    startBtn.disabled = true;
    statusEl.textContent = '注意观察...';
    statusEl.className = 'status-text';

    for (let i = 0; i < sequence.length; i++) {
        await new Promise(r => setTimeout(r, speed * 0.4));
        flashPad(sequence[i], Math.min(speed * 0.6, 400));
        spawnFloatNote(sequence[i]);
        await new Promise(r => setTimeout(r, speed * 0.6));
    }

    await new Promise(r => setTimeout(r, 300));
    isPlaying = false;
    isPlayerTurn = true;
    startBtn.disabled = false;
    playerIndex = 0;
    statusEl.textContent = '你的回合！';
    statusEl.className = 'status-text playing';
}

function playerPress(index) {
    if (isPlaying || !isPlayerTurn) return;
    initAudio();

    flashPad(index, 200);
    spawnFloatNote(index);

    if (index === sequence[playerIndex]) {
        hits++;
        playerIndex++;

        if (playerIndex >= sequence.length) {
            isPlayerTurn = false;
            score += round * 10;
            updateUI();
            statusEl.textContent = '完美！';
            statusEl.className = 'status-text';
            playChord();
            flashOverlay();

            setTimeout(() => {
                nextRound();
            }, 600);
        }
    } else {
        isPlayerTurn = false;
        statusEl.textContent = '记错了...';
        statusEl.className = 'status-text wrong';
        playFail();
        endGame();
    }
    updateUI();
}

function nextRound() {
    round++;
    addStep();
    speed = Math.max(250, 600 - round * 20);
    updateUI();
    setTimeout(() => playSequence(), 400);
}

function startRound() {
    if (isPlaying) return;
    if (sequence.length > 0) return;

    initAudio();
    phraseGen = { phrase: [], idx: 0 };
    sequence = [];
    round = 0;
    score = 0;
    hits = 0;
    speed = 600;
    playerIndex = 0;
    document.getElementById('gameOver').classList.remove('show');
    // 清除旧浮动物符
    document.querySelectorAll('.float-note').forEach(el => el.remove());

    nextRound();
}

function restartGame() {
    document.getElementById('gameOver').classList.remove('show');
    document.querySelectorAll('.float-note').forEach(el => el.remove());
    phraseGen = { phrase: [], idx: 0 };
    sequence = [];
    round = 0;
    score = 0;
    hits = 0;
    speed = 600;
    playerIndex = 0;
    isPlaying = false;
    isPlayerTurn = false;
    startBtn.disabled = false;
    statusEl.textContent = '新的一局！';
    statusEl.className = 'status-text';
    updateUI();

    setTimeout(() => {
        sequence = [];
        startRound();
    }, 500);
}

function resetToMenu() {
    sequence = [];
    round = 0;
    score = 0;
    hits = 0;
    isPlaying = false;
    isPlayerTurn = false;
    playerIndex = 0;
    startBtn.disabled = false;
    statusEl.textContent = '按下开始按钮';
    statusEl.className = 'status-text';
    pads.forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.float-note').forEach(el => el.remove());
    document.querySelectorAll('.viz-bar').forEach(b => { b.style.height = '0'; b.classList.remove('active'); });
    updateUI();
}

function endGame() {
    isPlayerTurn = false;
    pads.forEach(p => p.classList.remove('active'));

    if (score > highScore) {
        highScore = score;
        if (typeof window._syncScore === 'function') _syncScore('beats', highScore);
    }

    document.getElementById('goRound').textContent = round;
    document.getElementById('goScore').textContent = score;
    document.getElementById('goHits').textContent = hits;
    document.getElementById('goHigh').textContent = highScore;
    document.getElementById('gameOver').classList.add('show');

    highEl.textContent = highScore;
}

function updateUI() {
    scoreEl.textContent = score;
    roundEl.textContent = round;
    highEl.textContent = highScore;
}

// ---- 键盘支持 ----
document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key >= '1' && key <= '4') {
        playerPress(parseInt(key) - 1);
    } else if (key === ' ' || key === 'Enter') {
        e.preventDefault();
        if (document.getElementById('gameOver').classList.contains('show')) {
            restartGame();
        } else if (!isPlaying && !isPlayerTurn) {
            startRound();
        }
    }
    const map = { 'ArrowUp': 0, 'ArrowRight': 1, 'ArrowDown': 2, 'ArrowLeft': 3 };
    if (key in map) {
        e.preventDefault();
        playerPress(map[key]);
    }
});

// ---- 启动 ----
updateUI();
</script>
<script>
try {
    const _user = localStorage.getItem('arcadeUser');
    if (_user) {
        window._syncScore = function(game, score) {
            try {
                const all = JSON.parse(localStorage.getItem('arcadeProfiles') || '{}');
                if (!all[_user]) all[_user] = {};
                if (!all[_user][game] || score > all[_user][game]) {
                    all[_user][game] = score;
                    localStorage.setItem('arcadeProfiles', JSON.stringify(all));
                }
            } catch(e){}
        };
    }
} catch(e){}
</script>
