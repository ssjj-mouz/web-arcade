<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星海流沙 - 粒子交互</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif;
            color: #f8fafc;
        }
        canvas { display: block; }

        .mode-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
            z-index: 100; pointer-events: none;
        }
        .mode-bar button {
            pointer-events: auto;
            padding: 8px 16px; font-size: 0.8rem; font-weight: 600;
            background: rgba(255,255,255,0.06); color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px);
        }
        .mode-bar button:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }
        .mode-bar button.active {
            background: rgba(255,255,255,0.15);
            color: #fff; border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(255,255,255,0.08);
        }

        .info {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.25); font-size: 0.8rem; z-index: 100;
            text-align: center; pointer-events: none;
            transition: opacity 0.5s; letter-spacing: 0.5px;
        }

        .cursor-glow {
            position: fixed; pointer-events: none; z-index: 999;
            width: 300px; height: 300px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(40px);
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .btn-back {
            position: fixed; top: 20px; left: 20px; z-index: 110;
            padding: 8px 16px; font-size: 0.8rem; font-weight: bold;
            background: rgba(0,0,0,0.4); color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            cursor: pointer; backdrop-filter: blur(8px); transition: 0.2s;
            text-decoration: none;
        }
        .btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(0,0,0,0.6); }

        @media (max-width: 600px) {
            .mode-bar { top: 70px; gap: 4px; width: 90%; }
            .mode-bar button { padding: 6px 12px; font-size: 0.7rem; }
            .info { font-size: 0.65rem; bottom: 14px; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <a class="btn-back" href="../../index.html">🔙 大厅</a>

    <div class="mode-bar" id="modeBar">
        <button class="active" data-mode="gravity">🌌 引力场</button>
        <button data-mode="vortex">🌀 银河旋涡</button>
        <button data-mode="firework">🎆 粒子烟花</button>
        <button data-mode="trail">✨ 流光拖尾</button>
        <button data-mode="constellation">🔗 星空连线</button>
        <button data-mode="storm">🌪️ 粒子风暴</button>
    </div>

    <div class="info" id="infoText">🖱 移动鼠标交互 · 点击切换模式</div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <canvas id="sandbox"></canvas>

    <script>
        const canvas = document.getElementById('sandbox');
        const ctx = canvas.getContext('2d');
        const cursorGlow = document.getElementById('cursorGlow');
        const infoEl = document.getElementById('infoText');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let mouse = { x: W / 2, y: H / 2, radius: 150, clicked: false, clickX: 0, clickY: 0 };

        document.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        document.addEventListener('mousedown', e => {
            mouse.clicked = true;
            mouse.clickX = e.x;
            mouse.clickY = e.y;
        });
        document.addEventListener('mouseup', () => mouse.clicked = false);

        document.addEventListener('touchmove', e => {
            const t = e.touches[0];
            mouse.x = t.clientX;
            mouse.y = t.clientY;
        }, { passive: true });
        document.addEventListener('touchstart', e => {
            const t = e.touches[0];
            mouse.x = t.clientX;
            mouse.y = t.clientY;
            mouse.clicked = true;
            mouse.clickX = t.clientX;
            mouse.clickY = t.clientY;
        });
        document.addEventListener('touchend', () => mouse.clicked = false);

        function updateCursor() {
            cursorGlow.style.left = mouse.x + 'px';
            cursorGlow.style.top = mouse.y + 'px';
        }

        // ========== 基类 ==========
        class Particle {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.baseX = this.x;
                this.baseY = this.y;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 2 + 1;
                this.friction = 0.92;
                this.color = this.randomColor();
                this.alpha = 1;
                this.life = 1;
            }
            randomColor() {
                const palettes = [
                    ['#38bdf8', '#818cf8', '#c084fc', '#f472b6', '#e0f2fe'],
                    ['#22d3ee', '#2dd4bf', '#34d399', '#a3e635', '#fef08a'],
                    ['#f97316', '#fb923c', '#fbbf24', '#fcd34d', '#fff7ed'],
                    ['#e879f9', '#d946ef', '#c084fc', '#a855f7', '#fae8ff'],
                ];
                const p = palettes[Math.floor(Math.random() * palettes.length)];
                return p[Math.floor(Math.random() * p.length)];
            }
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.baseX = this.x;
                this.baseY = this.y;
                this.vx = 0;
                this.vy = 0;
            }
        }

        // ========== 各模式 ==========

        // ---- 模式1: 引力场 ----
        class ModeGravity {
            constructor() {
                this.particles = [];
                for (let i = 0; i < 2000; i++) this.particles.push(new Particle());
                this.name = '🖱 移动鼠标：引力吸附 · 点击鼠标：爆炸排斥';
            }
            update() {
                for (const p of this.particles) {
                    const dx = mouse.x - p.x;
                    const dy = mouse.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        const dirX = dx / dist || 0;
                        const dirY = dy / dist || 0;
                        if (mouse.clicked) {
                            p.vx -= dirX * force * 10;
                            p.vy -= dirY * force * 10;
                        } else {
                            p.vx += dirX * force;
                            p.vy += dirY * force;
                        }
                    } else {
                        p.vx += (p.baseX - p.x) * 0.008;
                        p.vy += (p.baseY - p.y) * 0.008;
                    }
                    p.vx *= p.friction;
                    p.vy *= p.friction;
                    p.x += p.vx;
                    p.y += p.vy;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, 0, W, H);
                ctx.globalCompositeOperation = 'lighter';
                for (const p of this.particles) {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalCompositeOperation = 'source-over';
            }
            resize() {
                for (const p of this.particles) {
                    p.baseX = Math.random() * W;
                    p.baseY = Math.random() * H;
                    p.x = p.baseX;
                    p.y = p.baseY;
                }
            }
        }

        // ---- 模式2: 银河旋涡 ----
        class ModeVortex {
            constructor() {
                this.particles = [];
                for (let i = 0; i < 2500; i++) {
                    const p = new Particle();
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * Math.sqrt(W * W + H * H) / 2;
                    p.orbitAngle = angle;
                    p.orbitRadius = radius;
                    p.orbitSpeed = (0.005 + Math.random() * 0.02) * (Math.random() > 0.5 ? 1 : -1);
                    p.spiralOffset = Math.random() * 100;
                    this.particles.push(p);
                }
                this.name = '🖱 移动鼠标：拖动星系中心 · 点击：重组旋臂';
            }
            update() {
                const cx = mouse.x;
                const cy = mouse.y;
                for (const p of this.particles) {
                    if (mouse.clicked) {
                        p.orbitAngle = Math.random() * Math.PI * 2;
                        p.orbitRadius = Math.random() * Math.sqrt(W * W + H * H) / 2;
                        p.orbitSpeed = (0.005 + Math.random() * 0.02) * (Math.random() > 0.5 ? 1 : -1);
                    }
                    p.orbitAngle += p.orbitSpeed;
                    const speedFactor = 1 + (1 - Math.min(p.orbitRadius / 400, 1)) * 0.5;
                    const targetX = cx + Math.cos(p.orbitAngle + p.spiralOffset * 0.01) * p.orbitRadius;
                    const targetY = cy + Math.sin(p.orbitAngle + p.spiralOffset * 0.01) * p.orbitRadius;
                    p.x += (targetX - p.x) * 0.06 * speedFactor;
                    p.y += (targetY - p.y) * 0.06 * speedFactor;
                }
                mouse.clicked = false;
            }
            draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(0, 0, W, H);
                ctx.globalCompositeOperation = 'lighter';
                for (const p of this.particles) {
                    const dist = Math.sqrt((p.x - mouse.x) ** 2 + (p.y - mouse.y) ** 2);
                    const alpha = Math.max(0.2, 1 - dist / 600);
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * (0.5 + alpha * 0.5), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';

                const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 80);
                grad.addColorStop(0, 'rgba(255,255,255,0.15)');
                grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 80, 0, Math.PI * 2);
                ctx.fill();
            }
            resize() {}
        }

        // ---- 模式3: 粒子烟花 ----
        class ModeFirework {
            constructor() {
                this.rockets = [];    // 上升中的火箭
                this.sparks = [];     // 爆炸粒子
                this.bgStars = [];
                this.flash = 0;
                this.lastType = -1;
                for (let i = 0; i < 20; i++) {
                    this.bgStars.push({
                        x: Math.random() * W, y: Math.random() * H,
                        size: Math.random() + 0.3
                    });
                }
                this.name = '🎆 点击发射火箭烟花';
            }

            launchRocket(x) {
                if (this.rockets.length > 5) return; // 最多5枚火箭同时飞行
                const targetY = 30 + Math.random() * (H * 0.35);
                let typeIdx;
                do {
                    typeIdx = Math.floor(Math.random() * 8);
                } while (typeIdx === this.lastType);
                this.lastType = typeIdx;
                this.rockets.push({
                    x: x,
                    y: H + 10,
                    targetY: targetY,
                    speed: 5 + Math.random() * 3,
                    angle: -1.5 + (Math.random() - 0.5) * 0.15,
                    trail: [],
                    explosionType: typeIdx
                });
            }

            explode(x, y, typeIdx) {
                if (this.sparks.length > 500) this.sparks.splice(0, this.sparks.length - 500);

                switch (typeIdx) {
                    case 0: this._peony(x, y); break;
                    case 1: this._star(x, y); break;
                    case 2: this._willow(x, y); break;
                    case 3: this._heart(x, y); break;
                    case 4: this._ring(x, y); break;
                    case 5: this._spider(x, y); break;
                    case 6: this._rainbow(x, y); break;
                    case 7: this._crossette(x, y); break;
                }
                this.flash = 0.5;
            }

            _spawn(x, y, angle, speed, colors, size, grav) {
                const p = {
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.004 + Math.random() * 0.004,
                    size: size * (1.8 + Math.random() * 1.5),
                    color: colors[Math.floor(Math.random() * colors.length)],
                    gravity: grav * (0.85 + Math.random() * 0.3),
                    isSecondary: false,
                    trail: []
                };
                this.sparks.push(p);
                return p;
            }

            _peony(x, y) {
                const colors = ['#ff6b6b','#ee5a24','#f0932b','#f9ca24'];
                for (let i = 0; i < 65; i++) {
                    const a = Math.random() * 6.28;
                    this._spawn(x, y, a, 3 + Math.random() * 5, colors, 3, 0.03);
                }
                for (let i = 0; i < 12; i++) {
                    const a = Math.random() * 6.28;
                    this._spawn(x, y, a, 7 + Math.random() * 4, ['#fff','#ffeaa7'], 2, 0.025);
                }
            }

            _star(x, y) {
                const colors = ['#fcd34d','#fbbf24','#f59e0b','#fff'];
                for (let i = 0; i < 7; i++) {
                    const ba = (i / 7) * 6.28 - 1.57;
                    for (let j = 0; j < 7; j++) {
                        this._spawn(x, y, ba + (Math.random()-0.5)*0.2, 6+Math.random()*5, colors, 3, 0.025);
                    }
                    for (let j = 0; j < 4; j++) {
                        this._spawn(x, y, ba+0.4+(Math.random()-0.5)*0.2, 2+Math.random()*2.5, ['#fef08a','#fff'], 1.5, 0.02);
                    }
                }
            }

            _willow(x, y) {
                const colors = ['#fbbf24','#f59e0b','#fcd34d'];
                for (let i = 0; i < 70; i++) {
                    const a = -1.57 + (Math.random() - 0.5) * 0.8;
                    this._spawn(x, y, a, 3 + Math.random() * 5, colors, 2.5, 0.05);
                }
            }

            _heart(x, y) {
                const colors = ['#ff6b6b','#f43f5e','#fb7185','#ffe4e6'];
                for (let i = 0; i < 70; i++) {
                    const t = (i / 70) * 6.28;
                    const hx = 16 * Math.pow(Math.sin(t), 3);
                    const hy = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                    this._spawn(x, y, Math.atan2(hy, hx), Math.sqrt(hx*hx+hy*hy)*0.4*(0.7+Math.random()*0.6), colors, 3, 0.035);
                }
                for (let i = 0; i < 12; i++) {
                    const a = Math.random() * 6.28;
                    this._spawn(x, y, a, Math.random()*2.5, ['#fff','#ffe4e6'], 1.5, 0.025);
                }
            }

            _ring(x, y) {
                const colors = ['#38bdf8','#22d3ee','#2dd4bf','#fff'];
                for (let i = 0; i < 60; i++) {
                    const a = (i / 60) * 6.28 + (Math.random()-0.5)*0.08;
                    this._spawn(x, y, a, 4.5 + (Math.random()-0.5)*0.8, colors, 3, 0.02);
                }
                for (let i = 0; i < 18; i++) {
                    const a = (i / 18) * 6.28 + Math.random()*0.3;
                    this._spawn(x, y, a, 2.5 + Math.random()*0.8, ['#fff'], 1.5, 0.012);
                }
            }

            _spider(x, y) {
                const colors = ['#c084fc','#a855f7','#e879f9','#fff'];
                for (let i = 0; i < 16; i++) {
                    const ba = (i / 16) * 6.28;
                    for (let j = 0; j < 4; j++) {
                        this._spawn(x, y, ba+(Math.random()-0.5)*0.12, 4+Math.random()*6, colors, 2.5, 0.015);
                    }
                }
                for (let i = 0; i < 16; i++) {
                    const a = Math.random() * 6.28;
                    this._spawn(x, y, a, Math.random()*3, ['#fff','#faf5ff'], 1.5, 0.008);
                }
            }

            _rainbow(x, y) {
                const rainbow = ['#ef4444','#f97316','#fcd34d','#22c55e','#3b82f6','#a855f7','#ec4899'];
                for (let i = 0; i < 65; i++) {
                    const a = (i / 65) * 6.28;
                    this._spawn(x, y, a, 4 + Math.random()*1, [rainbow[i % 7]], 3, 0.025);
                }
            }

            _crossette(x, y) {
                const colors = ['#34d399','#22c55e','#a3e635','#fef08a'];
                for (let i = 0; i < 55; i++) {
                    const a = Math.random() * 6.28;
                    this._spawn(x, y, a, 3 + Math.random()*5, colors, 3, 0.022);
                }
                for (let i = 0; i < 55; i++) {
                    const a = Math.random() * 6.28;
                    const p = this._spawn(x, y, a, 1.5 + Math.random()*2.5, colors, 1.5, 0.015);
                    p.isSecondary = true;
                    p.splitLife = 0.35 + Math.random() * 0.15;
                }
            }

            update() {
                // 点击 → 发射火箭
                if (mouse.clicked) {
                    this.launchRocket(mouse.clickX);
                    mouse.clicked = false;
                }

                // 更新火箭
                for (let i = this.rockets.length - 1; i >= 0; i--) {
                    const r = this.rockets[i];
                    r.trail.push({ x: r.x, y: r.y });
                    if (r.trail.length > 12) r.trail.shift();

                    r.x += Math.sin(r.angle) * 1.2;
                    r.y -= r.speed;

                    if (r.y <= r.targetY) {
                        this.explode(r.x, r.y, r.explosionType);
                        this.rockets.splice(i, 1);
                    }
                }

                // 更新爆炸粒子（带拖尾记录）
                for (let i = this.sparks.length - 1; i >= 0; i--) {
                    const s = this.sparks[i];

                    s.trail.push({ x: s.x, y: s.y });
                    if (s.trail.length > 5) s.trail.shift();

                    if (s.isSecondary && s.life < s.splitLife && s.life > s.splitLife - 0.03) {
                        for (let j = 0; j < 2; j++) {
                            const a = Math.random() * 6.28;
                            this.sparks.push({
                                x: s.x, y: s.y,
                                vx: Math.cos(a)*(1+Math.random()*1.5),
                                vy: Math.sin(a)*(1+Math.random()*1.5),
                                life: 0.5, decay: 0.02 + Math.random()*0.025,
                                size: 1 + Math.random(), color: '#fff',
                                gravity: 0.015,
                                isSecondary: false,
                                trail: []
                            });
                        }
                    }

                    s.vx *= 0.98;
                    s.vy += s.gravity;
                    s.x += s.vx;
                    s.y += s.vy;
                    s.life -= s.decay;
                    if (s.life <= 0) this.sparks.splice(i, 1);
                }

                this.flash *= 0.9;
            }

            draw() {
                ctx.fillStyle = '#070714';
                ctx.fillRect(0, 0, W, H);

                for (const s of this.bgStars) {
                    ctx.fillStyle = 'rgba(255,255,255,0.12)';
                    ctx.fillRect(s.x, s.y, s.size, s.size);
                }

                // 绘制火箭拖尾
                for (const r of this.rockets) {
                    for (let i = 0; i < r.trail.length; i++) {
                        const alpha = (i / r.trail.length) * 0.6;
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = '#ffd700';
                        ctx.shadowColor = '#ff8c00';
                        ctx.shadowBlur = 15;
                        const sz = 2 + (i / r.trail.length) * 5;
                        ctx.beginPath();
                        ctx.arc(r.trail[i].x, r.trail[i].y, sz/2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    // 火箭头
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 4, 0, Math.PI*2);
                    ctx.fill();
                }

                if (this.flash > 0.05) {
                    ctx.fillStyle = `rgba(255,220,200,${this.flash * 0.3})`;
                    ctx.fillRect(0, 0, W, H);
                }

                // 绘制爆炸粒子 + 拖尾
                for (const s of this.sparks) {
                    for (let i = 0; i < s.trail.length; i++) {
                        const alpha = (i / s.trail.length) * Math.min(1, s.life * 1.2) * 0.5;
                        const sz = Math.max(1, s.size * (i / s.trail.length) * 0.4);
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = s.color;
                        ctx.shadowColor = s.color;
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(s.trail[i].x, s.trail[i].y, sz/2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = Math.min(1, s.life * 1.5);
                    ctx.fillStyle = s.color;
                    ctx.shadowColor = s.color;
                    ctx.shadowBlur = 35;
                    const sz = Math.max(3, s.size * s.life * 0.8);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, sz/2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
            resize() {}
        }

        // ---- 模式4: 流光拖尾 ----
        class ModeTrail {
            constructor() {
                this.particles = [];
                this.frame = 0;
                this.mouseTrail = [];
                this.name = '🖱 移动鼠标：炫彩流光拖尾 · 点击：流光爆破';
            }
            update() {
                this.frame++;

                this.mouseTrail.push({ x: mouse.x, y: mouse.y });
                if (this.mouseTrail.length > 30) this.mouseTrail.shift();

                const count = mouse.clicked ? 8 : 4;
                for (let i = 0; i < count; i++) {
                    const hue = (this.frame * 2 + i * 30 + Math.random() * 20) % 360;
                    const angle = Math.random() * Math.PI * 2;
                    const spread = mouse.clicked ? 3 : 1.2;
                    const speed = mouse.clicked ? (2 + Math.random() * 4) : (0.5 + Math.random() * 1.5);
                    const life = mouse.clicked ? (20 + Math.random() * 20) : (40 + Math.random() * 30);
                    this.particles.push({
                        x: mouse.x + (Math.random() - 0.5) * 8,
                        y: mouse.y + (Math.random() - 0.5) * 8,
                        vx: Math.cos(angle) * speed * spread,
                        vy: Math.sin(angle) * speed * spread,
                        size: 2 + Math.random() * 4,
                        hue, sat: 80 + Math.random() * 20, light: 50 + Math.random() * 30,
                        life, maxLife: life, friction: 0.96
                    });
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.vx *= p.friction;
                    p.vy *= p.friction;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }

                if (this.particles.length > 1500) {
                    this.particles.splice(0, this.particles.length - 1500);
                }

                if (mouse.clicked) {
                    for (let i = 0; i < 50; i++) {
                        const hue = Math.random() * 360;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 2 + Math.random() * 5;
                        this.particles.push({
                            x: mouse.clickX, y: mouse.clickY,
                            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                            size: 1.5 + Math.random() * 3,
                            hue, sat: 100, light: 60,
                            life: 30 + Math.random() * 20, maxLife: 50, friction: 0.97
                        });
                    }
                    mouse.clicked = false;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.fillRect(0, 0, W, H);

                ctx.globalCompositeOperation = 'lighter';
                for (const p of this.particles) {
                    const ratio = p.life / p.maxLife;
                    ctx.globalAlpha = ratio * 0.7;
                    ctx.fillStyle = `hsl(${p.hue}, ${p.sat}%, ${p.light}%)`;
                    ctx.shadowColor = `hsl(${p.hue}, ${p.sat}%, ${p.light}%)`;
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * ratio, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (this.mouseTrail.length > 3) {
                    ctx.shadowBlur = 0;
                    for (let i = 1; i < this.mouseTrail.length; i++) {
                        const alpha = (i / this.mouseTrail.length) * 0.15;
                        const hue = (this.frame * 3 + i * 8) % 360;
                        ctx.strokeStyle = `hsla(${hue}, 90%, 60%, ${alpha})`;
                        ctx.lineWidth = 3 + (i / this.mouseTrail.length) * 4;
                        ctx.beginPath();
                        ctx.moveTo(this.mouseTrail[i-1].x, this.mouseTrail[i-1].y);
                        ctx.lineTo(this.mouseTrail[i].x, this.mouseTrail[i].y);
                        ctx.stroke();
                    }
                }

                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';
            }
            resize() { }
        }

        // ---- 模式5: 星空连线 ----
        class ModeConstellation {
            constructor() {
                this.stars = [];
                for (let i = 0; i < 500; i++) {
                    this.stars.push({
                        x: Math.random() * W, y: Math.random() * H,
                        size: Math.random() * 2.5 + 0.8,
                        vx: (Math.random() - 0.5) * 0.1,
                        vy: (Math.random() - 0.5) * 0.1,
                        twinkle: Math.random() * Math.PI * 2,
                        twinkleSpeed: 0.02 + Math.random() * 0.04,
                        hue: 200 + Math.random() * 60,
                    });
                }
                this.connections = [];
                this.waveCenter = null;
                this.waveRadius = 0;
                this.waveAlpha = 0;
                this.name = '🖱 鼠标扫过：星辰连线 · 点击：星震波扩散';
            }
            update() {
                for (const s of this.stars) {
                    s.twinkle += s.twinkleSpeed;

                    s.x += s.vx;
                    s.y += s.vy;
                    if (s.x < -20) s.x = W + 20;
                    if (s.x > W + 20) s.x = -20;
                    if (s.y < -20) s.y = H + 20;
                    if (s.y > H + 20) s.y = -20;

                    const dx = mouse.x - s.x;
                    const dy = mouse.y - s.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 250) {
                        const force = (250 - dist) / 250;
                        if (mouse.clicked) {
                            s.x -= (dx / (dist + 1)) * force * 4;
                            s.y -= (dy / (dist + 1)) * force * 4;
                        } else {
                            s.x += (dx / (dist + 1)) * force * 0.3;
                            s.y += (dy / (dist + 1)) * force * 0.3;
                        }
                    }
                }

                if (mouse.clicked) {
                    this.waveCenter = { x: mouse.clickX, y: mouse.clickY };
                    this.waveRadius = 10;
                    this.waveAlpha = 1;
                    for (const s of this.stars) {
                        const dx = s.x - mouse.clickX;
                        const dy = s.y - mouse.clickY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200) {
                            const force = (200 - dist) / 200;
                            s.x += (dx / (dist + 1)) * force * 8;
                            s.y += (dy / (dist + 1)) * force * 8;
                        }
                    }
                    mouse.clicked = false;
                }
                if (this.waveAlpha > 0) {
                    this.waveRadius += 8;
                    this.waveAlpha -= 0.012;
                    if (this.waveAlpha < 0) this.waveAlpha = 0;
                }

                this.connections = [];
                const nearby = this.stars.filter(s => {
                    const dx = s.x - mouse.x;
                    const dy = s.y - mouse.y;
                    return Math.abs(dx) < 350 && Math.abs(dy) < 350;
                });
                for (let i = 0; i < nearby.length; i++) {
                    for (let j = i + 1; j < nearby.length; j++) {
                        const dx = nearby[i].x - nearby[j].x;
                        const dy = nearby[i].y - nearby[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const mx = (nearby[i].x + nearby[j].x) / 2;
                            const my = (nearby[i].y + nearby[j].y) / 2;
                            const md = Math.sqrt((mx - mouse.x) ** 2 + (my - mouse.y) ** 2);
                            const bright = Math.max(0.2, 1 - md / 350);
                            this.connections.push({
                                a: nearby[i], b: nearby[j],
                                dist, alpha: (1 - dist / 150) * bright
                            });
                        }
                    }
                }
            }
            draw() {
                const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H));
                bg.addColorStop(0, '#080818');
                bg.addColorStop(0.5, '#040410');
                bg.addColorStop(1, '#020208');
                ctx.fillStyle = bg;
                ctx.fillRect(0, 0, W, H);

                if (this.waveAlpha > 0 && this.waveCenter) {
                    ctx.strokeStyle = `rgba(150, 200, 255, ${this.waveAlpha * 0.3})`;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 3; i++) {
                        ctx.globalAlpha = this.waveAlpha * (1 - i * 0.25);
                        ctx.beginPath();
                        ctx.arc(this.waveCenter.x, this.waveCenter.y, this.waveRadius + i * 30, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }

                ctx.globalCompositeOperation = 'lighter';
                for (const c of this.connections) {
                    ctx.strokeStyle = `rgba(180, 220, 255, ${c.alpha * 0.6})`;
                    ctx.lineWidth = c.alpha * 1.5;
                    ctx.beginPath();
                    ctx.moveTo(c.a.x, c.a.y);
                    ctx.lineTo(c.b.x, c.b.y);
                    ctx.stroke();
                    ctx.strokeStyle = `rgba(100, 150, 255, ${c.alpha * 0.15})`;
                    ctx.lineWidth = c.alpha * 4;
                    ctx.beginPath();
                    ctx.moveTo(c.a.x, c.a.y);
                    ctx.lineTo(c.b.x, c.b.y);
                    ctx.stroke();
                }

                for (const s of this.stars) {
                    const twinkle = 0.5 + Math.sin(s.twinkle) * 0.5;
                    const dx = s.x - mouse.x, dy = s.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const glowIntensity = Math.max(0, 1 - dist / 300);
                    const size = s.size * (0.8 + twinkle * 0.4 + glowIntensity * 0.5);

                    ctx.globalAlpha = 0.5 + twinkle * 0.5 + glowIntensity * 0.3;
                    ctx.shadowColor = `hsl(${s.hue}, 80%, 70%)`;
                    ctx.shadowBlur = 5 + glowIntensity * 25;
                    ctx.fillStyle = `hsl(${s.hue}, 80%, ${60 + twinkle * 30 + glowIntensity * 20}%)`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, size, 0, Math.PI * 2);
                    ctx.fill();

                    if (glowIntensity > 0.5) {
                        ctx.strokeStyle = `rgba(255,255,255,${(glowIntensity - 0.5) * 0.3})`;
                        ctx.lineWidth = 1;
                        const len = size * 2.5;
                        ctx.beginPath();
                        ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
                        ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
                        ctx.stroke();
                    }
                }
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';

                const glow = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
                glow.addColorStop(0, 'rgba(100,150,255,0.04)');
                glow.addColorStop(1, 'rgba(100,150,255,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 150, 0, Math.PI * 2);
                ctx.fill();
            }
            resize() { }
        }

        // ---- 模式6: 粒子风暴 ----
        class ModeStorm {
            constructor() {
                this.particles = [];
                for (let i = 0; i < 4000; i++) {
                    this.particles.push({
                        x: Math.random() * W, y: Math.random() * H,
                        size: Math.random() * 4 + 1,
                        angle: Math.random() * Math.PI * 2,
                        radius: Math.random() * Math.max(W, H) * 0.7,
                        speed: 0.5 + Math.random() * 1.5,
                        hue: 200 + Math.random() * 60,
                        light: 40 + Math.random() * 30,
                        drift: (Math.random() - 0.5) * 0.5
                    });
                }
                this.flash = 0;
                this.lightningTimer = 0;
                this.name = '🖱 移动风暴之眼 · 点击：雷暴冲击 ⚡';
            }
            update() {
                const cx = mouse.x, cy = mouse.y;

                for (const p of this.particles) {
                    p.angle += p.speed * 0.02;
                    const speedMult = 1 + p.radius / 500;

                    const targetX = cx + Math.cos(p.angle) * p.radius;
                    const targetY = cy + Math.sin(p.angle) * p.radius;

                    if (mouse.clicked) {
                        const dx = p.x - cx;
                        const dy = p.y - cy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 500) {
                            const force = (500 - dist) / 500;
                            p.radius += force * 20;
                            p.light = 90;
                        }
                    } else {
                        p.radius *= 0.9995;
                        if (p.radius < 20) p.radius = 20 + Math.random() * 30;
                    }

                    p.x += (targetX - p.x) * 0.08 * speedMult + p.drift;
                    p.y += (targetY - p.y) * 0.08 * speedMult + p.drift;

                    const dx = p.x - cx, dy = p.y - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const brightness = Math.max(0.2, 1 - dist / 400);
                    p.light += (40 + brightness * 40 - p.light) * 0.05;
                }

                if (mouse.clicked) {
                    this.flash = 1;
                    this.lightningTimer = 10;
                    mouse.clicked = false;
                }
                this.flash *= 0.9;
                if (this.lightningTimer > 0) {
                    this.lightningTimer--;
                    if (Math.random() < 0.3 && this.lightningTimer > 5) {
                        this.flash = 0.6 + Math.random() * 0.4;
                    }
                }
            }
            draw() {
                const bgBright = this.flash * 0.15;
                ctx.fillStyle = `rgba(5, 5, 20, ${0.1 + bgBright})`;
                ctx.fillRect(0, 0, W, H);

                if (this.flash > 0.05) {
                    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 300);
                    grad.addColorStop(0, `rgba(200, 220, 255, ${this.flash * 0.25})`);
                    grad.addColorStop(0.3, `rgba(150, 180, 255, ${this.flash * 0.1})`);
                    grad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(mouse.x, mouse.y, 300, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (this.flash > 0.3 && Math.random() < 0.4) {
                    ctx.strokeStyle = `rgba(255,255,255,${this.flash * 0.6})`;
                    ctx.lineWidth = 2 + Math.random() * 3;
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    let lx = mouse.x + (Math.random() - 0.5) * 100;
                    let ly = mouse.y - 100 + Math.random() * 50;
                    ctx.moveTo(lx, ly);
                    for (let i = 0; i < 8; i++) {
                        lx += (Math.random() - 0.5) * 60;
                        ly += 30 + Math.random() * 40;
                        ctx.lineTo(lx, ly);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.globalCompositeOperation = 'lighter';
                for (const p of this.particles) {
                    const dx = p.x - mouse.x, dy = p.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const b = Math.max(0.15, 1 - dist / 500);
                    ctx.globalAlpha = b;
                    const hue = p.hue + b * 30;
                    ctx.fillStyle = `hsl(${hue}, 90%, ${p.light}%)`;
                    const size = p.size * (0.5 + b * 0.8);
                    const angle = Math.atan2(dy, dx);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(angle + Math.PI / 2);
                    ctx.fillRect(-size * 0.3, -size * 1.5, size * 0.6, size * 3);
                    ctx.restore();
                }
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';

                const core = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 40);
                core.addColorStop(0, `rgba(255,255,255,${0.2 + this.flash * 0.3})`);
                core.addColorStop(0.5, `rgba(180, 200, 255, ${0.08 + this.flash * 0.15})`);
                core.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = core;
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 40, 0, Math.PI * 2);
                ctx.fill();
            }
            resize() {
                for (const p of this.particles) {
                    p.angle = Math.random() * Math.PI * 2;
                    p.radius = Math.random() * Math.max(W, H) * 0.7;
                    p.x = mouse.x + Math.cos(p.angle) * p.radius;
                    p.y = mouse.y + Math.sin(p.angle) * p.radius;
                }
            }
        }

        // ========== 模式管理 ==========
        const modes = {
            gravity: new ModeGravity(),
            vortex: new ModeVortex(),
            firework: new ModeFirework(),
            trail: new ModeTrail(),
            constellation: new ModeConstellation(),
            storm: new ModeStorm()
        };

        let currentMode = 'gravity';
        infoEl.textContent = modes[currentMode].name;

        document.querySelectorAll('.mode-bar button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.mode-bar button.active')?.classList.remove('active');
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                infoEl.textContent = modes[currentMode].name;

                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);

                if (currentMode === 'gravity') modes.gravity.resize();
            });
        });

        function animate() {
            updateCursor();
            const mode = modes[currentMode];
            mode.update();
            mode.draw();
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            resize();
            const mode = modes[currentMode];
            if (mode.resize) mode.resize();
        });
    </script>
</body>
