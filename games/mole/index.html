<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>霓虹晶核 · 定位训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}

:root{ --accent: #00ffc8; --accent2: #ff40c8; }

body{
  background:#060810;
  font-family:'Segoe UI','Inter',system-ui,sans-serif;
  height:100vh;width:100vw;
  overflow:hidden;
  cursor:none;
  color:#e0e8ff;
}

canvas{ position:fixed;inset:0; display:block; }

/* 自定义光标 */
#cursor{
  position:fixed;pointer-events:none;z-index:9999;
  width:26px;height:26px;
  transform:translate(-50%,-50%);
}
#cursor::before{
  content:'';position:absolute;
  top:50%;left:0;width:100%;height:1px;
  background:rgba(0,255,200,0.5);
  box-shadow:0 0 6px rgba(0,255,200,0.3);
}
#cursor::after{
  content:'';position:absolute;
  left:50%;top:0;height:100%;width:1px;
  background:rgba(0,255,200,0.5);
  box-shadow:0 0 6px rgba(0,255,200,0.3);
}
#cursor .dot{
  position:absolute;top:50%;left:50%;
  width:5px;height:5px;border-radius:50%;
  background:#00ffc8;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px #00ffc8, 0 0 20px rgba(0,255,200,0.4);
}

/* HUD */
.hud{ position:fixed;z-index:100;pointer-events:none; }
#hud-top{
  top:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:12px;align-items:center;
}
.hud-item{
  padding:6px 16px;
  background:rgba(6,8,16,0.7);backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,200,0.1);
  border-radius:10px;
  font-size:0.78rem;font-weight:600;color:#6a7a9a;
  text-align:center;min-width:70px;
}
.hud-item .val{
  display:block;font-size:1.35rem;font-weight:800;
  color:#00ffc8;text-shadow:0 0 12px rgba(0,255,200,0.3);
  line-height:1.15;
}
.hud-item .lbl{font-size:0.6rem;letter-spacing:1px;text-transform:uppercase}

#hud-bottom{
  bottom:22px;left:50%;transform:translateX(-50%);
  font-size:0.68rem;color:#3a4a6a;letter-spacing:1px;
}

/* 弹出 */
.pop{
  position:fixed;pointer-events:none;z-index:200;
  font-weight:900;font-size:1.1rem;
  animation:popUp 0.7s ease-out forwards;
  text-shadow:0 0 12px currentColor;
}
@keyframes popUp{
  0%{opacity:1;transform:translate(-50%,0) scale(0.5)}
  100%{opacity:0;transform:translate(-50%,-55px) scale(1.2)}
}
.combo-pop{
  position:fixed;pointer-events:none;z-index:200;
  font-weight:900;font-size:0.9rem;color:#ff40c8;
  text-shadow:0 0 14px rgba(255,64,200,0.5);
  animation:comboUp 0.8s ease-out forwards;
  letter-spacing:1px;
}
@keyframes comboUp{
  0%{opacity:1;transform:translate(-50%,0) scale(0.3)}
  50%{transform:translate(-50%,-16px) scale(1.15)}
  100%{opacity:0;transform:translate(-50%,-45px) scale(1)}
}

/* 覆盖层 */
.overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,6,12,0.94);backdrop-filter:blur(14px);
}
.overlay.hidden{display:none}

.card{
  text-align:center;
  padding:32px 36px;
  background:rgba(10,14,26,0.6);
  border:1px solid rgba(0,255,200,0.08);
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(0,180,200,0.04);
  width:min(88vw,380px);
}
.card h1{
  font-size:1.4rem;font-weight:800;letter-spacing:3px;margin-bottom:4px;
  background:linear-gradient(135deg,#00ffc8,#00aaff,#c840ff);
  -webkit-background-clip:text;color:transparent;
}
.card .sub{ font-size:0.76rem;color:#4a5a7a;margin-bottom:20px;line-height:1.5; }

/* 模式选择 */
.mode-row{ display:flex;gap:8px;margin-bottom:16px;justify-content:center; }
.mode-btn{
  flex:1;padding:10px 8px;font-size:0.76rem;font-weight:600;font-family:inherit;
  background:rgba(255,255,255,0.02);color:#6a7a9a;
  border:1px solid rgba(255,255,255,0.06);border-radius:10px;
  cursor:pointer;transition:0.25s;text-align:center;
}
.mode-btn .icon{ display:block;font-size:1.3rem;margin-bottom:3px; }
.mode-btn:hover{ border-color:rgba(0,255,200,0.2);color:#a0b8d0; }
.mode-btn.sel{
  border-color:rgba(0,255,200,0.35);color:#00ffc8;
  background:rgba(0,255,200,0.04);
  box-shadow:0 0 20px rgba(0,255,200,0.06);
}

/* 难度 & 时长 */
.opt-label{ font-size:0.64rem;color:#4a5a7a;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase; }
.opt-row{ display:flex;gap:6px;margin-bottom:14px;justify-content:center; }
.opt-btn{
  flex:1;padding:8px 6px;font-size:0.72rem;font-weight:600;font-family:inherit;
  background:rgba(255,255,255,0.02);color:#6a7a9a;
  border:1px solid rgba(255,255,255,0.05);border-radius:8px;
  cursor:pointer;transition:0.25s;text-align:center;
}
.opt-btn:hover{ color:#b0c8e0;border-color:rgba(255,255,255,0.12); }
.opt-btn.sel.easy{ border-color:rgba(0,255,200,0.3);color:#00ffc8; }
.opt-btn.sel.normal{ border-color:rgba(0,170,255,0.3);color:#0af; }
.opt-btn.sel.hard{ border-color:rgba(255,64,200,0.3);color:#ff40c8; }

.start-btn{
  width:100%;padding:12px;font-size:0.88rem;font-weight:700;font-family:inherit;
  border:none;border-radius:12px;cursor:pointer;transition:0.25s;
  background:linear-gradient(135deg,#00ffc8,#00aacc);color:#051015;
  box-shadow:0 0 25px rgba(0,255,200,0.2);
  letter-spacing:1px;
}
.start-btn:hover{ transform:scale(1.04);box-shadow:0 0 40px rgba(0,255,200,0.35); }

/* 结算 */
.stat-row{ display:flex;justify-content:center;gap:24px;margin-bottom:20px; }
.stat .n{ display:block;font-size:1.7rem;font-weight:800;color:#e0e8ff;line-height:1.1; }
.stat .t{ font-size:0.6rem;color:#4a5a7a;letter-spacing:1px }
.btn-row{ display:flex;gap:8px;justify-content:center;margin-top:16px; }
.btn{
  padding:10px 22px;font-size:0.8rem;font-weight:700;font-family:inherit;
  border:none;border-radius:10px;cursor:pointer;transition:0.25s;
  background:linear-gradient(135deg,#00ffc8,#00aacc);color:#051015;
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}
.btn:hover{transform:scale(1.06);box-shadow:0 0 35px rgba(0,255,200,0.35)}
.btn-ghost{
  padding:10px 22px;font-size:0.8rem;font-weight:700;font-family:inherit;
  background:rgba(255,255,255,0.03);color:#6a7a9a;
  border:1px solid rgba(255,255,255,0.06);border-radius:10px;
  cursor:pointer;transition:0.25s;
}
.btn-ghost:hover{color:#a0b8d0;border-color:rgba(255,255,255,0.15)}

.back-btn{
  position:fixed;top:18px;left:18px;z-index:600;
  padding:7px 14px;
  font-size:0.74rem;font-weight:600;font-family:inherit;
  background:rgba(6,8,16,0.6);backdrop-filter:blur(10px);
  color:#6a7a9a;border:1px solid rgba(255,255,255,0.06);
  border-radius:9px;cursor:pointer;transition:0.25s;
  text-decoration:none;
}
.back-btn:hover{color:#00ffc8;border-color:rgba(0,255,200,0.2);box-shadow:0 0 20px rgba(0,255,200,0.06)}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="cursor"><div class="dot"></div></div>

<a class="back-btn" href="../../index.html">← 大厅</a>

<!-- HUD -->
<div class="hud" id="hud-top">
  <div class="hud-item"><span class="val" id="hudScore">0</span><span class="lbl">分数</span></div>
  <div class="hud-item"><span class="val" id="hudTime">30</span><span class="lbl">剩余</span></div>
  <div class="hud-item"><span class="val" id="hudAcc">—</span><span class="lbl">精度</span></div>
  <div class="hud-item"><span class="val" id="hudCombo">0</span><span class="lbl">连击</span></div>
</div>
<div class="hud" id="hud-bottom">点击目标 · Click to hit</div>

<!-- 开始 -->
<div class="overlay" id="startOverlay">
  <div class="card">
    <h1>◇ 霓虹晶核</h1>
    <p class="sub">全屏定位 & 反应训练</p>

    <div class="opt-label">游戏模式</div>
    <div class="mode-row">
      <button class="mode-btn sel" data-mode="static">
        <span class="icon">⊙</span>精准定位
      </button>
      <button class="mode-btn" data-mode="tracking">
        <span class="icon">◈</span>移动追踪
      </button>
      <button class="mode-btn" data-mode="mixed">
        <span class="icon">◉</span>混合训练
      </button>
    </div>

    <div class="opt-label">难度</div>
    <div class="opt-row">
      <button class="opt-btn sel easy" data-diff="easy">入门</button>
      <button class="opt-btn normal" data-diff="normal">进阶</button>
      <button class="opt-btn hard" data-diff="hard">极限</button>
    </div>

    <div class="opt-label">时长</div>
    <div class="opt-row">
      <button class="opt-btn sel easy" data-dur="15">15秒</button>
      <button class="opt-btn normal" data-dur="30">30秒</button>
      <button class="opt-btn hard" data-dur="60">60秒</button>
    </div>

    <button class="start-btn" onclick="startGame()">▶ 开始训练</button>
  </div>
</div>

<!-- 结算 -->
<div class="overlay hidden" id="resultOverlay">
  <div class="card">
    <div style="font-size:2.6rem;margin-bottom:4px" id="resultEmoji">◇</div>
    <div class="stat-row">
      <div class="stat"><span class="n" id="resultScore" style="color:#00ffc8">0</span><span class="t">得分</span></div>
      <div class="stat"><span class="n" id="resultAcc">0%</span><span class="t">精度</span></div>
      <div class="stat"><span class="n" id="resultAvg">0ms</span><span class="t">均时</span></div>
    </div>
    <div class="stat-row" style="margin-bottom:14px">
      <div class="stat"><span class="n" id="resultCombo" style="font-size:1.2rem">0</span><span class="t">最大连击</span></div>
      <div class="stat"><span class="n" id="resultHits" style="font-size:1.2rem">0</span><span class="t">命中</span></div>
      <div class="stat"><span class="n" id="resultBest" style="font-size:1.2rem">0</span><span class="t">记录</span></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="replayBtn">再来一局</button>
      <button class="btn-ghost" onclick="showStart()">换模式</button>
    </div>
  </div>
</div>

<script>
// ======================= CONFIG =======================
const DIFFICULTY = {
  easy:   { size: 38, stayMin: 2200, stayMax: 3600, interval: 700, speed: 0.8, targets: 1 },
  normal: { size: 24, stayMin: 1400, stayMax: 2400, interval: 500, speed: 1.5, targets: 2 },
  hard:   { size: 15, stayMin: 700,  stayMax: 1300, interval: 350, speed: 2.5, targets: 3 }
};

const SHAPES = ['diamond', 'hexagon', 'circle', 'cross', 'diamond', 'hexagon', 'circle'];
const COMBO_TIMEOUT = 1800;

// ======================= STATE =======================
let gameMode = 'static';
let difficulty = 'easy';
let gameDuration = 30;

let score = 0, combo = 0, maxCombo = 0;
let gameActive = false, timeLeft = 0;
let timerInterval = null;
let targets = [];
let totalClicks = 0, totalDist = 0, totalHits = 0;
let lastHitTime = 0;
let accRunning = 0;
let bestScore = parseInt(localStorage.getItem('moleBest') || '0');
let spawnTimer = null;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ======================= AUDIO =======================
let actx = null;
function ensureAudio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }
function playTone(freq, dur, type, vol, delay){
  try{
    ensureAudio();
    const t = actx.currentTime + (delay||0);
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}
function sfxHit(){ playTone(700,0.04,'sine',0.06);setTimeout(()=>playTone(1000,0.04,'sine',0.05),25); }
function sfxPerfect(){ playTone(1000,0.06,'sine',0.08);setTimeout(()=>playTone(1400,0.06,'sine',0.06),40);setTimeout(()=>playTone(1800,0.08,'sine',0.05),80); }
function sfxMiss(){ playTone(160,0.05,'sawtooth',0.04); }
function sfxStart(){ playTone(440,0.08,'sine',0.06);setTimeout(()=>playTone(660,0.08,'sine',0.06),70);setTimeout(()=>playTone(880,0.12,'sine',0.05),140); }
function sfxEnd(){ playTone(880,0.08,'sine',0.06);setTimeout(()=>playTone(1100,0.08,'sine',0.06),90);setTimeout(()=>playTone(1500,0.14,'sine',0.05),180); }

// ======================= SETUP UI =======================
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    gameMode = btn.dataset.mode;
  });
});

document.querySelectorAll('.opt-btn[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.opt-btn[data-diff]').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    difficulty = btn.dataset.diff;
  });
});

document.querySelectorAll('.opt-btn[data-dur]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.opt-btn[data-dur]').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    gameDuration = parseInt(btn.dataset.dur);
  });
});

// ======================= TARGET =======================
function spawnTarget(){
  if(!gameActive) return;
  const cfg = DIFFICULTY[difficulty];
  if(targets.length >= cfg.targets) return;

  const isTracking = gameMode === 'tracking' || (gameMode === 'mixed' && Math.random() < 0.4);
  const size = cfg.size;
  const margin = size + 20;

  let x, y, vx = 0, vy = 0;
  if(isTracking){
    // Spawn from edge, move across
    const edge = Math.floor(Math.random() * 4);
    switch(edge){
      case 0: x = -margin; y = Math.random() * H; vx = cfg.speed * (1 + Math.random()); vy = (Math.random() - 0.5) * cfg.speed * 2; break;
      case 1: x = W + margin; y = Math.random() * H; vx = -cfg.speed * (1 + Math.random()); vy = (Math.random() - 0.5) * cfg.speed * 2; break;
      case 2: x = Math.random() * W; y = -margin; vx = (Math.random() - 0.5) * cfg.speed * 2; vy = cfg.speed * (1 + Math.random()); break;
      default: x = Math.random() * W; y = H + margin; vx = (Math.random() - 0.5) * cfg.speed * 2; vy = -cfg.speed * (1 + Math.random()); break;
    }
  } else {
    x = margin + Math.random() * (W - margin * 2);
    y = margin + Math.random() * (H - margin * 2);
  }

  const t = {
    x, y, vx, vy,
    size,
    maxSize: size,
    shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
    isTracking,
    startTime: Date.now(),
    opacity: 1,
    hit: false,
    hue: Math.random() < 0.15 ? 45 : 170 // 15% gold, rest cyan
  };

  if(!isTracking){
    const stay = cfg.stayMin + Math.random() * (cfg.stayMax - cfg.stayMin);
    t.timer = setTimeout(() => {
      if(!t.hit){ onMiss(); removeTarget(t); }
    }, stay);
  }

  targets.push(t);
}

function removeTarget(t){
  const idx = targets.indexOf(t);
  if(idx >= 0) targets.splice(idx, 1);
  if(t.timer){ clearTimeout(t.timer); t.timer = null; }
}

function onMiss(){
  combo = 0;
  updateHUD();
  sfxMiss();
}

function scheduleNext(){
  if(!gameActive) return;
  if(spawnTimer){ clearTimeout(spawnTimer); }
  const delay = DIFFICULTY[difficulty].interval;
  spawnTimer = setTimeout(() => { spawnTarget(); scheduleNext(); }, delay);
}

// ======================= CLICK =======================
canvas.addEventListener('click', e => {
  if(!gameActive) return;
  const mx = e.clientX;
  const my = e.clientY;

  // Find closest target
  let best = null, bestDist = Infinity;
  for(const t of targets){
    if(t.hit) continue;
    const dx = mx - t.x;
    const dy = my - t.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist <= t.size && dist < bestDist){
      best = t;
      bestDist = dist;
    }
  }

  if(best){
    best.hit = true;
    totalHits++;
    totalClicks++;
    totalDist += bestDist;

    const now = Date.now();
    if(now - lastHitTime < COMBO_TIMEOUT){ combo++; if(combo > maxCombo) maxCombo = combo; }
    else { combo = 0; }
    lastHitTime = now;

    const acc = 1 - (bestDist / best.size);
    let pts = Math.round(10 + acc * 40);
    if(combo >= 3) pts = Math.round(pts * (1 + combo * 0.1));
    score += pts;

    // Real-time accuracy
    accRunning = Math.round((1 - totalDist / (totalClicks * best.size)) * 100);
    accRunning = Math.max(0, Math.min(100, accRunning));

    if(acc > 0.85){ sfxPerfect(); showPop(mx, my, '#'+pts, '#ffd700'); }
    else { sfxHit(); showPop(mx, my, '+' + pts, '#00ffc8'); }

    if(combo >= 4) showComboPop(mx, my, combo);

    spawnRipple(best.x, best.y, acc);
    removeTarget(best);
    updateHUD();
  }
});

// ======================= RIPPLE PARTICLES =======================
let ripples = [];
function spawnRipple(x, y, acc){
  const count = acc > 0.85 ? 14 : 7;
  const hue = acc > 0.85 ? 'gold' : 'cyan';
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 2 + Math.random() * 6;
    ripples.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life: 1, decay: 0.02 + Math.random() * 0.03, hue
    });
  }
}

// ======================= POPUPS =======================
function showPop(x, y, text, color){
  const el = document.createElement('div');
  el.className = 'pop';
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.color = color;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function showComboPop(x, y, n){
  const el = document.createElement('div');
  el.className = 'combo-pop';
  el.style.left = x + 'px'; el.style.top = (y - 22) + 'px';
  el.textContent = n + 'x COMBO';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ======================= HUD =======================
function updateHUD(){
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudCombo').textContent = combo;
  document.getElementById('hudAcc').textContent = totalClicks > 0 ? accRunning + '%' : '—';
}

// ======================= RENDER =======================
// Draw a filled shape with glow
function drawShape(t){
  const { x, y, size: s, shape, opacity: alpha, hue } = t;
  const r = s * 0.7;
  const col = hue === 45
    ? `rgba(255,200,0,${alpha})`
    : `rgba(0,255,200,${alpha})`;
  const glowCol = hue === 45
    ? `rgba(255,200,0,${0.5*alpha})`
    : `rgba(0,255,200,${0.5*alpha})`;

  ctx.save();
  ctx.translate(x, y);

  // Outer glow
  ctx.shadowColor = glowCol;
  ctx.shadowBlur = s * 0.7;
  ctx.fillStyle = col;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;

  switch(shape){
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.7, 0);
      ctx.lineTo(0, r);
      ctx.lineTo(-r * 0.7, 0);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = s * 0.3;
      ctx.fillStyle = `rgba(255,255,255,${0.5*alpha})`;
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.4);
      ctx.lineTo(r * 0.25, 0);
      ctx.lineTo(0, r * 0.4);
      ctx.lineTo(-r * 0.25, 0);
      ctx.closePath();
      ctx.fill();
      break;

    case 'hexagon':
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a = Math.PI/6 + i * Math.PI/3;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = s * 0.3;
      ctx.fillStyle = `rgba(255,255,255,${0.4*alpha})`;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a = Math.PI/6 + i * Math.PI/3;
        const px = Math.cos(a) * r * 0.45;
        const py = Math.sin(a) * r * 0.45;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      break;

    case 'circle':
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = s * 0.3;
      ctx.fillStyle = `rgba(255,255,255,${0.45*alpha})`;
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.4, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'cross':
      const w = r * 0.3;
      ctx.beginPath();
      ctx.moveTo(-w, -r);
      ctx.lineTo(w, -r);
      ctx.lineTo(w, -w);
      ctx.lineTo(r, -w);
      ctx.lineTo(r, w);
      ctx.lineTo(w, w);
      ctx.lineTo(w, r);
      ctx.lineTo(-w, r);
      ctx.lineTo(-w, w);
      ctx.lineTo(-r, w);
      ctx.lineTo(-r, -w);
      ctx.lineTo(-w, -w);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = s * 0.2;
      ctx.fillStyle = `rgba(255,255,255,${0.4*alpha})`;
      ctx.beginPath();
      ctx.moveTo(-w*0.4, -r*0.5);
      ctx.lineTo(w*0.4, -r*0.5);
      ctx.lineTo(w*0.4, -w*0.4);
      ctx.lineTo(r*0.5, -w*0.4);
      ctx.lineTo(r*0.5, w*0.4);
      ctx.lineTo(w*0.4, w*0.4);
      ctx.lineTo(w*0.4, r*0.5);
      ctx.lineTo(-w*0.4, r*0.5);
      ctx.lineTo(-w*0.4, w*0.4);
      ctx.lineTo(-r*0.5, w*0.4);
      ctx.lineTo(-r*0.5, -w*0.4);
      ctx.lineTo(-w*0.4, -w*0.4);
      ctx.closePath();
      ctx.fill();
      break;
  }

  ctx.restore();
}

function render(){
  ctx.clearRect(0, 0, W, H);

  // Dot grid
  const gap = 42;
  ctx.fillStyle = 'rgba(255,255,255,0.018)';
  for(let x = gap; x < W; x += gap){
    for(let y = gap; y < H; y += gap){
      ctx.beginPath(); ctx.arc(x, y, 0.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // Ripples
  for(let i=ripples.length-1;i>=0;i--){
    const r = ripples[i];
    r.x += r.vx; r.y += r.vy;
    r.life -= r.decay;
    if(r.life <= 0){ ripples.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(r.x, r.y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = r.hue === 'gold' ? `rgba(255,200,0,${r.life*0.7})` : `rgba(0,255,200,${r.life*0.7})`;
    ctx.fill();
  }

  // Targets
  for(const t of targets){
    if(t.hit) continue;

    // Update tracking targets
    if(t.isTracking){
      t.x += t.vx;
      t.y += t.vy;
      // Remove if off screen
      if(t.x < -60 || t.x > W + 60 || t.y < -60 || t.y > H + 60){
        if(!t.hit){ onMiss(); }
        removeTarget(t);
        continue;
      }
    }

    // Shrink approaching timeout (static only)
    if(!t.isTracking){
      const elapsed = Date.now() - t.startTime;
      const cfg = DIFFICULTY[difficulty];
      const totalStay = cfg.stayMax;
      const progress = Math.min(elapsed / totalStay, 1);
      t.size = t.maxSize * (1 - progress * 0.55);
      t.opacity = 1 - progress * 0.4;
    }

    drawShape(t);
  }

  requestAnimationFrame(render);
}

// ======================= GAME FLOW =======================
function startGame(){
  score = 0; combo = 0; maxCombo = 0;
  totalClicks = 0; totalDist = 0; totalHits = 0;
  gameActive = true; timeLeft = gameDuration; lastHitTime = 0;
  accRunning = 0;
  targets = [];
  ripples = [];

  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('hudTime').style.color = '';
  document.getElementById('hudAcc').textContent = '—';
  updateHUD();
  document.getElementById('hudTime').textContent = timeLeft;

  // Update bottom text
  const labels = { static: '精准点击目标 · Click targets', tracking: '追踪移动目标 · Track & click', mixed: '混合训练 · Mixed mode' };
  document.getElementById('hud-bottom').textContent = labels[gameMode] || labels.static;

  sfxStart();
  startTimer();
  spawnTarget();
  scheduleNext();
}

function startTimer(){
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('hudTime').textContent = timeLeft;
    if(timeLeft <= 5 && timeLeft > 0){
      document.getElementById('hudTime').style.color = '#ff4050';
    }
    if(timeLeft <= 0) endGame();
  }, 1000);
}

function endGame(){
  gameActive = false;
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  if(spawnTimer){ clearTimeout(spawnTimer); spawnTimer = null; }
  targets.forEach(t => { if(t.timer) clearTimeout(t.timer); });
  targets = [];

  sfxEnd();

  const avgAcc = totalClicks > 0 ? accRunning : 0;
  const avgTime = totalHits > 0 ? Math.round(gameDuration * 1000 / totalHits) : 0;

  if(score > bestScore){
    bestScore = score;
    localStorage.setItem('moleBest', bestScore);
    if(typeof window._syncScore === 'function') _syncScore('mole', score);
  }

  const emoji = score >= 300 ? '👑' : score >= 180 ? '💎' : score >= 80 ? '⚡' : '◇';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultAcc').textContent = Math.max(0, Math.min(100, avgAcc)) + '%';
  document.getElementById('resultAvg').textContent = avgTime + 'ms';
  document.getElementById('resultCombo').textContent = maxCombo;
  document.getElementById('resultHits').textContent = totalHits;
  document.getElementById('resultBest').textContent = bestScore;
  document.getElementById('resultOverlay').classList.remove('hidden');

  document.getElementById('hudTime').textContent = '0';
  document.getElementById('hudTime').style.color = '';
}

function showStart(){
  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('startOverlay').classList.remove('hidden');
}

document.getElementById('replayBtn').addEventListener('click', () => startGame());

// ======================= CURSOR =======================
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

// ======================= BOOT =======================
render();

try {
  const _user = localStorage.getItem('arcadeUser');
  if(_user){
    window._syncScore = function(game, sc){
      try {
        const all = JSON.parse(localStorage.getItem('arcadeProfiles') || '{}');
        if(!all[_user]) all[_user] = {};
        if(!all[_user][game] || sc > all[_user][game]){
          all[_user][game] = sc;
          localStorage.setItem('arcadeProfiles', JSON.stringify(all));
        }
      } catch(e){}
    };
  }
} catch(e){}
</script>
